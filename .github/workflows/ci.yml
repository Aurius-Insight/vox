name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vox
          POSTGRES_PASSWORD: vox
          POSTGRES_DB: vox_mvp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vox -d vox_mvp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vox:vox@localhost:5432/vox_mvp
      # prisma.config.ts exige DIRECT_URL (migrations/introspect). Em CI bate
      # no mesmo Postgres do DATABASE_URL.
      DIRECT_URL: postgresql://vox:vox@localhost:5432/vox_mvp
      REDIS_URL: redis://localhost:6379
      APP_ORIGIN: http://localhost:5173
      SESSION_SECRET: ci-session-secret-with-at-least-32-chars
      WEBHOOK_SECRET: ci-webhook-secret-with-24-chars
      ADMIN_EMAIL: admin@voxrj.com
      ADMIN_PASSWORD: admin-dev-password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Apply migrations
        run: npm run db:migrate

      - name: Seed
        run: npm run db:seed

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test
        run: npm test
