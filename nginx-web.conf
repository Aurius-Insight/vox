server {
    listen 80;
    server_name _;

    # SPA fallback: qualquer rota nao-arquivo cai em index.html (React Router).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # Assets versionados (Vite gera com hash) podem ter cache agressivo.
        location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|avif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        # index.html nunca cacheia — garante que update de hash de assets propague.
        location = /index.html {
            add_header Cache-Control "no-store";
        }
    }

    # Health check direto do container web.
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
